<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes calendriers</title>
    <link rel="stylesheet" href="Styles/main.css">
    <link rel="stylesheet" href="Styles/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="topbar">
    <div class="topbar-left">
        <img src="image/calendraft-logo.png" class="logo">
        <h1>Calendraft</h1>
    </div>

    <div class="topbar-right">
        <span class="notif">🔔</span>
        <div class="user">
            <div class="avatar">A</div>
            <span id="userEmail"></span>
        </div>
        <button onclick="logoutUser()" class="logout-btn">Déconnexion</button>
    </div>
</div>
<div class="container">

    <h2>Mes calendriers</h2>
    <p class="subtitle">Sélectionne un calendrier pour continuer</p>

    <div class="actions">
        <button class="primary-btn" onclick="createCalendar()">+ Nouveau calendrier</button>
        <input type="text" placeholder="Rechercher..." class="search">
    </div>

    <div id="calendarList" class="calendar-grid"></div>
        <div class="stats-card">
            <p id="calendarCount">0 calendriers au total</p>
        </div>
</div>

<script type="module" src="Scripts/dashboard.js"></script>
</body>
</html>
